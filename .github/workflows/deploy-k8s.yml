name: Deploy Kubernetes Config

# Triggered when Helm charts / Kubernetes config changes on main,
# WITHOUT app code changes. Re-deploys using the current image tag
# already in ECR (no Docker build needed).
#
# Use deploy-app.yml when application code has changed.

on:
  push:
    branches: [main]
    paths:
      - "helm/**"
      - ".github/workflows/deploy-k8s.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest git SHA on main)"
        required: false
        default: ""

env:
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION:    us-east-1

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Helm Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Read Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          terraform init -reconfigure
          echo "instance_id=$(terraform output -raw k3s_instance_id)" >> $GITHUB_OUTPUT
          echo "k3s_ip=$(terraform output -raw k3s_public_ip)" >> $GITHUB_OUTPUT
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "sqs_url=$(terraform output -raw sqs_queue_url)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT

      - name: Resolve image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying image tag: $TAG"

      - name: Wait for SSM agent
        run: |
          INSTANCE_ID="${{ steps.tf.outputs.instance_id }}"
          DEADLINE=$(( $(date +%s) + 300 ))
          echo "Waiting for SSM on $INSTANCE_ID..."
          until aws ssm describe-instance-information \
                --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
                --query 'InstanceInformationList[0].PingStatus' \
                --output text 2>/dev/null | grep -q "^Online$"; do
            (( $(date +%s) < DEADLINE )) || { echo "SSM timeout"; exit 1; }
            sleep 10
          done
          echo "SSM online"

      - name: Fetch kubeconfig from k3s via SSM
        run: |
          INSTANCE_ID="${{ steps.tf.outputs.instance_id }}"
          K3S_IP="${{ steps.tf.outputs.k3s_ip }}"

          CMD_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters 'commands=["cat /etc/rancher/k3s/k3s.yaml"]' \
            --region $AWS_DEFAULT_REGION \
            --query 'Command.CommandId' --output text)"

          sleep 5

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region $AWS_DEFAULT_REGION \
            --query 'StandardOutputContent' --output text \
            | sed "s|127.0.0.1|${K3S_IP}|g" > kubeconfig
          chmod 600 kubeconfig

      - name: Install Helmfile
        run: |
          curl -fsSL https://github.com/helmfile/helmfile/releases/download/v0.167.1/helmfile_0.167.1_linux_amd64.tar.gz \
            | tar xz
          sudo mv helmfile /usr/local/bin/

      - name: Helmfile apply (Helm charts update only)
        working-directory: helm
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |
          ECR_URL="${{ steps.tf.outputs.ecr_url }}"
          ECR_REGISTRY="${ECR_URL%%/*}"
          ECR_GDAL_URL="${ECR_REGISTRY}/asterra-devops-assignment-gdal"

          helmfile apply \
            --state-values-set "dataProcessorImage=${ECR_URL}" \
            --state-values-set "gdalServiceImage=${ECR_GDAL_URL}" \
            --state-values-set "imageTag=${{ steps.meta.outputs.tag }}" \
            --state-values-set "sqsQueueUrl=${{ steps.tf.outputs.sqs_url }}" \
            --state-values-set "s3BucketName=${{ steps.tf.outputs.s3_bucket }}"

      - name: Verify rollout
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |
          kubectl rollout status deployment/data-processor --timeout=120s || true
          kubectl rollout status deployment/gdal-service   --timeout=120s || true
          kubectl get pods -A

      - name: Summary
        run: |
          echo "## Kubernetes Config Deploy Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|-|-|" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`${{ steps.meta.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
