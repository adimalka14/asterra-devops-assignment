name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

env:
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION:    us-east-1

jobs:
  test-python:
    name: Run Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [data-processor, gdal-service]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        if: matrix.service == 'data-processor'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test data-processor
        if: matrix.service == 'data-processor'
        run: |
          pip install --upgrade pip
          pip install -r app/data-processor/requirements.txt pytest pytest-cov
          PYTHONPATH=app/data-processor pytest app/data-processor/tests/ \
            -v --cov=app/data-processor --cov-report=term-missing --cov-fail-under=0

      - name: Test gdal-service
        if: matrix.service == 'gdal-service'
        run: |
          docker build -t gdal-test -f app/gdal-service/Dockerfile app/gdal-service
          docker run --rm gdal-test python3 -m pytest tests/ -v

  test-infra:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: terraform fmt
        run: terraform fmt -check -recursive terraform/

      - name: terraform validate
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate
