apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: MS_MAPFILE
              value: {{ .Values.mapserver.mapfile }}
            - name: MS_MAP_NO_PATH
              value: "{{ .Values.mapserver.msMapNoPath }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          livenessProbe:
            httpGet:
              path: {{ .Values.mapserver.probePath }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.mapserver.probePath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: mapserver-config
              mountPath: /etc/mapserver
          {{- include "common.resources" . | nindent 10 }}
      volumes:
        - name: mapserver-config
          configMap:
            name: {{ include "common.fullname" . }}-config
