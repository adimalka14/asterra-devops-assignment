image:
  repository: camptocamp/mapserver
  tag: "7.6"
  pullPolicy: IfNotPresent

replicas: 1

service:
  type: NodePort
  port: 80
  nodePort: 30080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

mapserver:
  mapfile: /etc/mapserver/mapserver.map
  wmsOnlineResource: "http://mapserver/cgi-bin/mapserv"
  dataPath: "/data/sample.geojson"
  projection: "init=epsg:4326"
  probePath: "/cgi-bin/mapserv?SERVICE=WMS&REQUEST=GetCapabilities"
  msMapNoPath: "FALSE"
