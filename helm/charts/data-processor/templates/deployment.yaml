apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: AWS_REGION
              value: {{ .Values.env.region }}
            - name: SQS_QUEUE_URL
              value: {{ .Values.env.sqsQueueUrl }}
            - name: S3_BUCKET_NAME
              value: {{ .Values.env.s3BucketName }}
            - name: LOG_GROUP
              value: {{ .Values.env.logGroup }}
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: password
          {{- include "common.resources" . | nindent 10 }}